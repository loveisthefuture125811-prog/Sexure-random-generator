<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Selector" />
  <title>Secure Random Selector</title>

  <!-- Inline SVG icons as data URIs are used throughout; no external deps -->
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:         #000000;
      --surface:    #080c10;
      --surface2:   #0e1318;
      --border:     #7ee7ff;
      --border-dim: #2a3d4d;
      --text:       #f0faff;
      --text-soft:  #b8cdd8;
      --text-dim:   #6a8899;
      --cyan:       #00f0ff;
      --cyan-dim:   #4dd9e8;
      --pink:       #ff5ad9;
      --green:      #7dff9b;
      --gold:       #ffd54a;
      --glow:       rgba(0,240,255,0.18);
      --glow-sm:    rgba(0,240,255,0.08);
      --safe-top:   env(safe-area-inset-top, 0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
    }

    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden; /* App-shell: inner panels scroll */
    }

    /* ── App shell (full-screen flex column) ───────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* dynamic viewport for mobile browsers */
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
      background:
        linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px),
        radial-gradient(ellipse at top, rgba(0,255,255,0.07), transparent 55%),
        var(--bg);
      background-size: 24px 24px, 24px 24px, auto;
    }

    /* ── Top bar ────────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-dim);
      background: rgba(8,12,16,0.9);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
      gap: 8px;
    }

    #topbar h1 {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--glow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #install-btn {
      display: none; /* shown by JS when install prompt fires */
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--cyan-dim);
      color: var(--cyan-dim);
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 1px;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      white-space: nowrap;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    #install-btn:hover { background: var(--glow-sm); color: var(--cyan); }

    /* ── Tab bar ────────────────────────────────────────────────────── */
    #tabbar {
      display: flex;
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
      background: var(--surface);
    }

    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--glow);
    }
    .tab-btn:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: -2px;
    }

    /* ── Panels ─────────────────────────────────────────────────────── */
    .panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      gap: 12px;
      flex-direction: column;
    }
    .panel.active { display: flex; }

    /* ── Selector panel ─────────────────────────────────────────────── */
    .input-label {
      color: var(--text-soft);
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: #000;
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 12px;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      border-radius: 4px;
      caret-color: var(--cyan);
    }
    textarea::placeholder { color: #6a8899; opacity: 1; }
    textarea:focus { outline: 2px solid var(--cyan); outline-offset: 2px; }

    /* ── Result box ─────────────────────────────────────────────────── */
    #result-display {
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
      padding: 14px;
      border: 1.5px solid var(--border);
      background: #000;
      border-radius: 4px;
      color: var(--text);
      transition: color 0.2s, text-shadow 0.2s, box-shadow 0.2s;
    }
    #result-display.locked {
      color: var(--cyan);
      text-shadow: 0 0 16px rgba(0,240,255,0.45);
      box-shadow: inset 0 0 24px rgba(0,240,255,0.07);
    }

    /* ── Buttons ────────────────────────────────────────────────────── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-row.single { grid-template-columns: 1fr; }

    button.primary, button.secondary, button.danger {
      min-height: 46px;
      padding: 10px 14px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1.5px solid;
      transition: background 0.12s, color 0.12s, transform 0.05s;
      width: 100%;
    }
    button.primary {
      background: var(--cyan);
      color: #000;
      border-color: var(--cyan);
    }
    button.primary:hover { background: #a8fcff; }
    button.primary:active { transform: translateY(1px); }
    button.primary:disabled {
      background: #1a2530;
      color: #5a7080;
      border-color: #2a3d4d;
      cursor: not-allowed;
      transform: none;
    }
    button.secondary {
      background: transparent;
      color: var(--cyan-dim);
      border-color: var(--border-dim);
    }
    button.secondary:hover { background: var(--glow-sm); border-color: var(--cyan-dim); }
    button.danger {
      background: transparent;
      color: var(--pink);
      border-color: var(--pink);
    }
    button.danger:hover { background: rgba(255,90,217,0.10); }

    button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

    /* ── Log ────────────────────────────────────────────────────────── */
    #sys-log {
      font-size: 0.75rem;
      color: var(--text-soft);
      background: #03050a;
      padding: 10px 12px;
      height: 100px;
      overflow-y: auto;
      border: 1.5px solid var(--border-dim);
      line-height: 1.7;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .log-time { color: var(--text-dim); margin-right: 6px; }

    /* ── Banner ─────────────────────────────────────────────────────── */
    .banner {
      display: none;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 0.82rem;
      line-height: 1.5;
      border: 1.5px solid;
    }
    .banner.warn { background: rgba(255,90,217,0.10); color: #ffd3f7; border-color: var(--pink); }
    .banner.err  { background: rgba(255,213,74,0.10);  color: #fff4b8; border-color: var(--gold); }

    /* ── History / Bookmarks panels ─────────────────────────────────── */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .list-title {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .result-card.bookmarked { border-color: var(--gold); }

    .card-text {
      flex: 1;
      min-width: 0;
    }
    .card-value {
      font-size: 1.05rem;
      font-weight: 700;
      word-break: break-word;
      color: var(--text);
    }
    .card-meta {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: center;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border-dim);
      color: var(--text-dim);
      border-radius: 3px;
      padding: 5px 7px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      min-width: 30px;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn.star { color: var(--gold); border-color: var(--gold); }
    .icon-btn.star:hover { background: rgba(255,213,74,0.12); }
    .icon-btn.del  { color: var(--pink); border-color: rgba(255,90,217,0.4); }
    .icon-btn.del:hover  { background: rgba(255,90,217,0.10); }
    .icon-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.82rem;
      padding: 32px 0;
      letter-spacing: 1px;
    }

    /* ── Confirmation modal ─────────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    #modal-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 0 32px var(--glow);
    }
    #modal-title {
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 10px;
    }
    #modal-msg {
      font-size: 0.9rem;
      color: var(--text-soft);
      line-height: 1.55;
      margin-bottom: 20px;
    }
    #modal-msg strong { color: var(--text); }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; min-height: 42px; }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

    /* ── Reduced motion ─────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ── High contrast ──────────────────────────────────────────────── */
    @media (prefers-contrast: more) {
      :root {
        --border: #fff; --border-dim: #ccc; --text: #fff;
        --text-soft: #fff; --text-dim: #ccc; --cyan: #fff;
      }
      #app { background-image: none; }
    }
  </style>
</head>
<body>

<!-- ── PWA Install prompt (top bar) ──────────────────────────────────── -->
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <h1>⚡ Secure Selector</h1>
    <button id="install-btn" aria-label="Install app to homescreen">
      ⬇ Add to Home
    </button>
  </div>

  <!-- Tab bar -->
  <div id="tabbar" role="tablist">
    <button class="tab-btn active" data-tab="selector" role="tab" aria-selected="true"  aria-controls="panel-selector">Select</button>
    <button class="tab-btn"        data-tab="history"  role="tab" aria-selected="false" aria-controls="panel-history">History</button>
    <button class="tab-btn"        data-tab="bookmarks" role="tab" aria-selected="false" aria-controls="panel-bookmarks">Bookmarks</button>
  </div>

  <!-- ── SELECTOR PANEL ──────────────────────────────────────────────── -->
  <div class="panel active" id="panel-selector" role="tabpanel">

    <div>
      <div id="warn-banner" class="banner warn" role="alert"></div>
      <div id="err-banner"  class="banner err"  role="alert"></div>
    </div>

    <div>
      <label class="input-label" for="optionsInput">Options — one per line</label>
      <textarea id="optionsInput" spellcheck="false" autocomplete="off"
        placeholder="Option 1&#10;Option 2&#10;Option 3"></textarea>
    </div>

    <div
      id="result-display"
      aria-live="polite"
      aria-atomic="true"
    >Awaiting input</div>

    <div class="btn-row">
      <button class="primary" id="execBtn" type="button">▶ Spin</button>
      <button class="secondary" id="saveBtn" type="button" disabled>★ Save Result</button>
    </div>

    <div>
      <div id="sys-log" aria-live="polite" aria-label="System log"></div>
    </div>

  </div><!-- /selector panel -->

  <!-- ── HISTORY PANEL ───────────────────────────────────────────────── -->
  <div class="panel" id="panel-history" role="tabpanel">
    <div class="list-header">
      <span class="list-title">Saved Results</span>
      <button class="danger" id="clearHistoryBtn" style="width:auto;padding:6px 12px;font-size:0.72rem;">✕ Clear All</button>
    </div>
    <div class="result-list" id="history-list"></div>
  </div>

  <!-- ── BOOKMARKS PANEL ─────────────────────────────────────────────── -->
  <div class="panel" id="panel-bookmarks" role="tabpanel">
    <div class="list-header">
      <span class="list-title">Bookmarked</span>
      <button class="danger" id="clearBookmarksBtn" style="width:auto;padding:6px 12px;font-size:0.72rem;">✕ Clear All</button>
    </div>
    <div class="result-list" id="bookmarks-list"></div>
  </div>

</div><!-- /app -->

<!-- ── CONFIRMATION MODAL ─────────────────────────────────────────────── -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal-box">
    <div id="modal-title">Confirm</div>
    <div id="modal-msg"></div>
    <div class="modal-btns">
      <button class="secondary" id="modal-cancel">Cancel</button>
      <button class="primary"   id="modal-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     JavaScript
════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Storage helpers (localStorage, JSON safe) ──────────────────────── */
const DB = {
  _key: k => 'srs_' + k,

  get(k, fallback = null) {
    try {
      const v = localStorage.getItem(DB._key(k));
      return v === null ? fallback : JSON.parse(v);
    } catch { return fallback; }
  },

  set(k, v) {
    try { localStorage.setItem(DB._key(k), JSON.stringify(v)); return true; }
    catch { return false; }
  }
};

/* ── Persistent state ───────────────────────────────────────────────── */
// history: array of { id, value, options, ts }
// bookmarks: array of { id, value, options, ts }
let history   = DB.get('history',   []);
let bookmarks = DB.get('bookmarks', []);

// Restore last textarea content between sessions
const savedOptions = DB.get('last_options', '');

/* ── DOM refs ───────────────────────────────────────────────────────── */
const optionsInput   = document.getElementById('optionsInput');
const resultDisplay  = document.getElementById('result-display');
const execBtn        = document.getElementById('execBtn');
const saveBtn        = document.getElementById('saveBtn');
const sysLog         = document.getElementById('sys-log');
const warnBanner     = document.getElementById('warn-banner');
const errBanner      = document.getElementById('err-banner');
const historyList    = document.getElementById('history-list');
const bookmarksList  = document.getElementById('bookmarks-list');
const clearHistoryBtn   = document.getElementById('clearHistoryBtn');
const clearBookmarksBtn = document.getElementById('clearBookmarksBtn');
const installBtn     = document.getElementById('install-btn');

/* ── Modal ──────────────────────────────────────────────────────────── */
const modalOverlay = document.getElementById('modal-overlay');
const modalMsg     = document.getElementById('modal-msg');
const modalOk      = document.getElementById('modal-ok');
const modalCancel  = document.getElementById('modal-cancel');

/**
 * confirm(message) → Promise<boolean>
 * Shows the modal and resolves true/false based on user choice.
 * The spin path NEVER calls this — only save/delete/clear do.
 */
function confirm(msgHTML) {
  return new Promise(resolve => {
    modalMsg.innerHTML = msgHTML;
    modalOverlay.classList.add('open');
    modalOk.focus();

    function cleanup(result) {
      modalOverlay.classList.remove('open');
      modalOk.removeEventListener('click', onOk);
      modalCancel.removeEventListener('click', onCancel);
      modalOverlay.removeEventListener('click', onOverlay);
      resolve(result);
    }

    const onOk      = () => cleanup(true);
    const onCancel  = () => cleanup(false);
    const onOverlay = e => { if (e.target === modalOverlay) cleanup(false); };

    modalOk.addEventListener('click', onOk);
    modalCancel.addEventListener('click', onCancel);
    modalOverlay.addEventListener('click', onOverlay);
  });
}

// Escape key closes modal as cancel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('open')) {
    modalCancel.click();
  }
});

/* ── Crypto ─────────────────────────────────────────────────────────── */
const crypto = window.crypto || window.msCrypto;
const hasRNG = !!(crypto && typeof crypto.getRandomValues === 'function');

function secureUint32() {
  const buf = new Uint32Array(1);
  crypto.getRandomValues(buf);
  return buf[0];
}

// Rejection-sampling modulo to eliminate bias
function fairIndex(len) {
  const MAX = 0x100000000;
  const limit = MAX - (MAX % len);
  while (true) {
    const n = secureUint32();
    if (n < limit) return n % len;
  }
}

/* ── Log ────────────────────────────────────────────────────────────── */
function log(msg, color) {
  const row = document.createElement('div');
  const ts  = document.createElement('span');
  ts.className = 'log-time';
  ts.textContent = '[' + new Date().toLocaleTimeString([], {
    hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit'
  }) + ']';
  const txt = document.createElement('span');
  txt.textContent = msg;
  if (color) txt.style.color = color;
  row.appendChild(ts);
  row.appendChild(txt);
  sysLog.prepend(row);
}

/* ── Banner helpers ─────────────────────────────────────────────────── */
function showErr(msg) {
  errBanner.textContent = msg;
  errBanner.style.display = 'block';
  log(msg, '#fff4b8');
}
function clearErr() {
  errBanner.textContent = '';
  errBanner.style.display = 'none';
}

/* ── Parse options ──────────────────────────────────────────────────── */
function parseOptions(raw) {
  return raw.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
}

/* ── Spin state ─────────────────────────────────────────────────────── */
let busy      = false;
let spinTimer = null;
let lastResult = null;   // holds { value, options } after each spin

const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function setBusy(state) {
  busy = state;
  execBtn.disabled = state;
  execBtn.textContent = state ? 'Spinning…' : '▶ Spin';
  // Save button disabled while spinning; re-evaluated in finishSpin
  if (state) saveBtn.disabled = true;
}

function finishSpin(value, options) {
  lastResult = { value, options };
  resultDisplay.setAttribute('aria-live', 'assertive');
  resultDisplay.textContent = value;
  resultDisplay.classList.add('locked');
  log('Selection locked: ' + value, '#6ff7ff');
  setBusy(false);
  saveBtn.disabled = false; // enable save now that we have a result
}

function stopSpin() {
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
}

/* ── Execute selection (NO confirmation — spin must not be interrupted) */
function execute() {
  if (busy) return;
  clearErr();
  stopSpin();
  resultDisplay.classList.remove('locked');
  resultDisplay.setAttribute('aria-live', 'polite');
  lastResult = null;
  saveBtn.disabled = true;

  const options = parseOptions(optionsInput.value);

  if (options.length < 2) {
    showErr('Enter at least 2 options, one per line.');
    resultDisplay.textContent = 'Need 2+ options';
    return;
  }

  if (!hasRNG) {
    warnBanner.textContent = 'Secure random API unavailable in this browser.';
    warnBanner.style.display = 'block';
    showErr('No secure RNG available.');
    resultDisplay.textContent = 'No secure RNG';
    return;
  }

  // Persist the options list between sessions
  DB.set('last_options', optionsInput.value);

  setBusy(true);
  log('Loaded ' + options.length + ' options.', '#b8cdd8');
  log('Generating unbiased result…', '#6ff7ff');

  // Pick the real answer immediately (fair, bias-free)
  const finalIdx  = fairIndex(options.length);
  const finalValue = options[finalIdx];

  if (prefersReduced) {
    finishSpin(finalValue, options);
    return;
  }

  // Spin preview — uses same fair algorithm, purely cosmetic
  let cycles = 0;
  const maxCycles = 24;
  spinTimer = setInterval(() => {
    resultDisplay.textContent = options[fairIndex(options.length)];
    cycles++;
    if (cycles >= maxCycles) {
      stopSpin();
      finishSpin(finalValue, options);
    }
  }, 65);
}

/* ── Save result (WITH confirmation) ───────────────────────────────── */
async function saveResult() {
  if (!lastResult) return;

  const ok = await confirm(
    `Save <strong>${escHtml(lastResult.value)}</strong> to History?`
  );
  if (!ok) return;

  const entry = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2),
    value: lastResult.value,
    options: lastResult.options,
    ts: new Date().toISOString()
  };

  history.unshift(entry);
  if (history.length > 200) history.length = 200; // cap at 200 entries
  DB.set('history', history);
  renderHistory();
  log('Saved to history: ' + entry.value, '#7dff9b');
}

/* ── Bookmark (WITH confirmation) ───────────────────────────────────── */
async function addBookmark(entry) {
  // Don't duplicate
  if (bookmarks.some(b => b.id === entry.id)) return;

  const ok = await confirm(
    `Bookmark <strong>${escHtml(entry.value)}</strong>? It will persist even if History is cleared.`
  );
  if (!ok) return;

  bookmarks.unshift({ ...entry });
  DB.set('bookmarks', bookmarks);
  renderBookmarks();
  log('Bookmarked: ' + entry.value, '#ffd54a');
}

/* ── Remove from history (WITH confirmation) ────────────────────────── */
async function removeFromHistory(id) {
  const entry = history.find(e => e.id === id);
  if (!entry) return;

  const ok = await confirm(`Delete <strong>${escHtml(entry.value)}</strong> from History?`);
  if (!ok) return;

  history = history.filter(e => e.id !== id);
  DB.set('history', history);
  renderHistory();
  log('Deleted from history: ' + entry.value, '#ff5ad9');
}

/* ── Remove from bookmarks (WITH confirmation) ──────────────────────── */
async function removeBookmark(id) {
  const entry = bookmarks.find(b => b.id === id);
  if (!entry) return;

  const ok = await confirm(`Remove bookmark <strong>${escHtml(entry.value)}</strong>?`);
  if (!ok) return;

  bookmarks = bookmarks.filter(b => b.id !== id);
  DB.set('bookmarks', bookmarks);
  renderBookmarks();
  log('Bookmark removed: ' + entry.value, '#ff5ad9');
}

/* ── Clear all history (WITH confirmation) ──────────────────────────── */
clearHistoryBtn.addEventListener('click', async () => {
  if (!history.length) return;
  const ok = await confirm(`Clear all <strong>${history.length}</strong> history entries? Bookmarks are unaffected.`);
  if (!ok) return;
  history = [];
  DB.set('history', history);
  renderHistory();
  log('History cleared.', '#ff5ad9');
});

/* ── Clear all bookmarks (WITH confirmation) ────────────────────────── */
clearBookmarksBtn.addEventListener('click', async () => {
  if (!bookmarks.length) return;
  const ok = await confirm(`Remove all <strong>${bookmarks.length}</strong> bookmarks? This cannot be undone.`);
  if (!ok) return;
  bookmarks = [];
  DB.set('bookmarks', bookmarks);
  renderBookmarks();
  log('All bookmarks removed.', '#ff5ad9');
});

/* ── Render helpers ─────────────────────────────────────────────────── */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleString([], {
      month:'short', day:'numeric',
      hour:'2-digit', minute:'2-digit', hour12: true
    });
  } catch { return iso; }
}

function makeCard(entry, isBookmark = false) {
  const card = document.createElement('div');
  card.className = 'result-card' + (isBookmark ? ' bookmarked' : '');
  card.dataset.id = entry.id;

  const isAlreadyBookmarked = bookmarks.some(b => b.id === entry.id);

  card.innerHTML = `
    <div class="card-text">
      <div class="card-value">${escHtml(entry.value)}</div>
      <div class="card-meta">${formatDate(entry.ts)} · ${entry.options.length} options</div>
    </div>
    <div class="card-actions">
      ${!isBookmark ? `<button class="icon-btn star" aria-label="Bookmark this result" title="Bookmark">
        ${isAlreadyBookmarked ? '★' : '☆'}
      </button>` : ''}
      <button class="icon-btn del" aria-label="Delete" title="Delete">✕</button>
    </div>
  `;

  if (!isBookmark) {
    card.querySelector('.star').addEventListener('click', () => addBookmark(entry));
  }
  card.querySelector('.del').addEventListener('click', () =>
    isBookmark ? removeBookmark(entry.id) : removeFromHistory(entry.id)
  );

  return card;
}

function renderHistory() {
  historyList.innerHTML = '';
  if (!history.length) {
    historyList.innerHTML = '<div class="empty-state">No saved results yet.<br>Spin and save a result to see it here.</div>';
    return;
  }
  history.forEach(e => historyList.appendChild(makeCard(e, false)));
}

function renderBookmarks() {
  bookmarksList.innerHTML = '';
  if (!bookmarks.length) {
    bookmarksList.innerHTML = '<div class="empty-state">No bookmarks yet.<br>Star a result from History to pin it here permanently.</div>';
    return;
  }
  bookmarks.forEach(e => bookmarksList.appendChild(makeCard(e, true)));
}

/* ── Tabs ───────────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    btn.classList.add('active');
    btn.setAttribute('aria-selected', 'true');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── Wire up main buttons ───────────────────────────────────────────── */
execBtn.addEventListener('click', execute);
saveBtn.addEventListener('click', saveResult);

optionsInput.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') execute();
});

/* ── Init ───────────────────────────────────────────────────────────── */
if (savedOptions) optionsInput.value = savedOptions;

if (!hasRNG) {
  warnBanner.textContent = 'Secure random API unavailable in this browser.';
  warnBanner.style.display = 'block';
  execBtn.disabled = true;
  resultDisplay.textContent = 'No secure RNG';
  log('Secure RNG unavailable.', '#ff5ad9');
} else {
  log('Secure RNG online.', '#7dff9b');
  log('Persistent storage ready.', '#6ff7ff');
  log('Ready.', '#b8cdd8');
}

renderHistory();
renderBookmarks();

/* ── PWA: "Add to Home Screen" install prompt ───────────────────────── */
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  // The browser fires this when the site qualifies for installation.
  // We prevent the automatic mini-infobar and show our own button instead.
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = 'flex';
  log('App is installable — tap "Add to Home" in the top bar.', '#7dff9b');
});

installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  log('Install outcome: ' + outcome, outcome === 'accepted' ? '#7dff9b' : '#b8cdd8');
  deferredInstallPrompt = null;
  installBtn.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  log('App installed to homescreen.', '#7dff9b');
  installBtn.style.display = 'none';
  deferredInstallPrompt = null;
});

/* ── Service Worker (offline support, required for PWA install) ─────── */
// We register an inline service worker via a Blob URL.
// This is the standard technique for single-file PWAs hosted anywhere,
// including GitHub Pages.
(function registerSW() {
  if (!('serviceWorker' in navigator)) return;

  // The SW just caches this page on first load and serves it offline.
  const swCode = `
const CACHE = 'srs-v1';

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE).then(cache =>
      cache.add(self.location.origin + self.location.pathname)
    ).catch(() => {}) // graceful fail if already cached
  );
  self.skipWaiting();
});

self.addEventListener('activate', event => {
  event.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener('fetch', event => {
  if (event.request.method !== 'GET') return;
  event.respondWith(
    caches.match(event.request).then(cached => cached || fetch(event.request))
  );
});
`;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL, { scope: './' })
    .then(reg => {
      // Revoke after a short delay so the SW has time to install
      setTimeout(() => URL.revokeObjectURL(swURL), 10000);
    })
    .catch(err => {
      // SW registration can fail in some secure contexts (e.g. file://)
      // That's fine — the app still works, just without offline support.
    });
})();

/* ── Inline Web App Manifest ────────────────────────────────────────── */
// Inject a <link rel="manifest"> pointing to a Blob-encoded manifest.
// This tells browsers the PWA metadata (name, icons, display mode, etc.)
// without needing a separate manifest.json file.
(function injectManifest() {
  const manifest = {
    name: 'Secure Random Selector',
    short_name: 'Selector',
    description: 'Cryptographically fair random selection with persistent history.',
    start_url: './',
    display: 'standalone',          // full-screen, no browser chrome
    background_color: '#000000',
    theme_color: '#000000',
    orientation: 'portrait-primary',
    icons: [
      // Minimal SVG icon that works as the homescreen icon
      {
        src: 'data:image/svg+xml,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <rect width="512" height="512" fill="#000"/>
            <text x="256" y="340" font-size="320" text-anchor="middle"
              font-family="monospace" fill="#00f0ff">⚡</text>
          </svg>
        `),
        sizes: 'any',
        type: 'image/svg+xml',
        purpose: 'any maskable'
      }
    ]
  };

  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel   = 'manifest';
  link.href  = url;
  document.head.appendChild(link);
})();

</script>
